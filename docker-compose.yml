services:
  mysql:
    image: mysql:8.4
    container_name: happy-soup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: happysoup
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/web/backend-java
      dockerfile: Dockerfile
    container_name: happy-soup-backend
    volumes:
      - ~/.config/gcloud:/root/.config/gcloud:ro
      - ./apps/web/backend-java/.secrets:/run/secrets:ro
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: happysoup
      DB_USERNAME: root
      DB_PASSWORD: root
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/vertex-ai-key.json}
      GEMINI_USE_VERTEX_AI: ${GEMINI_USE_VERTEX_AI:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_PROJECT_ID: ${GEMINI_PROJECT_ID:-}
      GEMINI_LOCATION: ${GEMINI_LOCATION:-}
      SOUP_LOCAL_FALLBACK_ENABLED: ${SOUP_LOCAL_FALLBACK_ENABLED:-false}
      APP_GCS_BUCKET_NAME: "happy-soup"
      APP_GCS_OBJECT_PREFIX: ${APP_GCS_OBJECT_PREFIX:-collections}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: happy-soup-web
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data:
