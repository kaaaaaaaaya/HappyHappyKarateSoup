name: Backend CI

on:
  push:
    paths:
      - "apps/web/backend-java/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/web/backend-java/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web/backend-java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B -e -DtrimStackTrace=false test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:test
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          GEMINI_USE_VERTEX_AI: "false"

      - name: Dump surefire reports on failure
        if: failure()
        run: |
          echo "=== surefire report files ==="
          find target/surefire-reports -type f | sort || true
          echo ""
          for f in target/surefire-reports/*.txt; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            sed -n '1,260p' "$f" || true
            echo ""
          done

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: apps/web/backend-java/target/surefire-reports
          if-no-files-found: ignore
