server:
  port: ${PORT:8080}

spring:
  application:
    name: happy-happy-karate-soup-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:happysoup}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com
  use-vertex-ai: ${GEMINI_USE_VERTEX_AI:true}
  project-id: ${GEMINI_PROJECT_ID:}
  location: ${GEMINI_LOCATION:us-central1}
  text-model: ${GEMINI_TEXT_MODEL:gemini-2.5-flash}
  image-model: ${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}

auth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

app:
  charts:
    cache-seconds:
      list: 60
      detail: 300
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  gcs:
    bucket-name: ${APP_GCS_BUCKET_NAME:happy-soup}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
